services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  mc:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      echo 'waiting for minio...';
      until (wget -qO- http://minio:9000/minio/health/ready >/dev/null 2>&1); do
        sleep 1;
      done;
      mc alias set local ${MINIO_ENDPOINT} ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb -p local/${MINIO_BUCKET} || true;
      mc anonymous set download local/${MINIO_BUCKET} || true;
      exit 0;
      "

  backend:
    build: ./backend
    env_file: .env
    depends_on:
      - db
      - redis
      - minio
      - mc
    ports:
      - "${API_PORT}:8000"
    command: >
      sh -c "python -m app.main"
    volumes:
      - ./backend:/app

  worker:
    build: ./backend
    env_file:
      - .env
    depends_on:
      - redis
      - db
    command: >
      celery -A app.queue:celery_app worker -l info -Q default,celery
      --pool=solo
      --concurrency=1
      --prefetch-multiplier=1
      --max-tasks-per-child=1
    restart: unless-stopped
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    env_file: .env
    depends_on:
      - backend
    ports:
      - "${FRONT_PORT}:5173"
    volumes:
      - ./frontend:/app
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  pgdata:
  miniodata:
  ollama:
